<section class="grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
  <article class="stat-card border-main-100 bg-main-50 text-main-800">
    <div class="stat-card-layout">
      <span class="stat-icon bg-main-100 text-main-700">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M12 6v6l4 2" />
          <circle cx="12" cy="12" r="9" />
        </svg>
      </span>
      <div class="stat-content">
        <p>Pendientes</p>
        <strong>{{ moderationData.stats().pending }}</strong>
        <span>Por revisar</span>
      </div>
    </div>
  </article>

  <article class="stat-card border-emerald-100 bg-emerald-50 text-emerald-800">
    <div class="stat-card-layout">
      <span class="stat-icon bg-emerald-100 text-emerald-700">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M20 6 9 17l-5-5" />
        </svg>
      </span>
      <div class="stat-content">
        <p>Aprobados hoy</p>
        <strong>{{ moderationData.stats().approvedToday }}</strong>
        <span>Listos para la biblioteca</span>
      </div>
    </div>
  </article>

  <article class="stat-card border-rose-100 bg-rose-50 text-rose-800">
    <div class="stat-card-layout">
      <span class="stat-icon bg-rose-100 text-rose-700">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </span>
      <div class="stat-content">
        <p>Rechazados</p>
        <strong>{{ moderationData.stats().rejected }}</strong>
        <span>Por permisos o calidad</span>
      </div>
    </div>
  </article>

  <article class="stat-card border-amber-100 bg-amber-50 text-amber-800">
    <div class="stat-card-layout">
      <span class="stat-icon bg-amber-100 text-amber-700">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
          <path d="M12 9v4" />
          <path d="M12 17h.01" />
        </svg>
      </span>
      <div class="stat-content">
        <p>Reportes activos</p>
        <strong>{{ moderationData.stats().reports }}</strong>
        <span>Atención prioritaria</span>
      </div>
    </div>
  </article>
</section>
