<div class="max-w-2xl">
  <h1 class="text-4xl font-extrabold tracking-tight text-slate-950 sm:text-5xl">
    Crea tu <span class="text-main-600">cuenta</span>
  </h1>

  <div class="relative mt-6 inline-block max-w-md overflow-hidden sm:max-w-lg">
    <img
      src="/img/registro_imagen.png"
      alt="Estudiantes compartiendo recursos educativos"
      class="h-auto w-full object-contain"
    />
    <div class="pointer-events-none absolute inset-x-0 bottom-0 h-24 bg-gradient-to-t from-[#fffaf7] to-transparent"></div>
  </div>

  <div class="mt-6 grid max-w-md gap-5">
    <article>
      <div class="flex items-start gap-3">
        <span class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-gradient-to-br from-main-100 to-emerald-200 shadow-md shadow-main-900/10">
          <img src="/img/share_icon.png" alt="" class="h-7 w-7 object-contain" />
        </span>
        <div>
          <p class="text-sm font-bold text-slate-900">Comparte materiales</p>
          <p class="mt-1 text-sm leading-5 text-slate-500">Publica apuntes, guías o recursos que puedan ayudar a otros estudiantes.</p>
        </div>
      </div>
    </article>

    <article>
      <div class="flex items-start gap-3">
        <span class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-gradient-to-br from-sky-100 to-cyan-200 shadow-md shadow-sky-900/10">
          <img src="/img/book_icon.png" alt="" class="h-7 w-7 object-contain" />
        </span>
        <div>
          <p class="text-sm font-bold text-slate-900">Accede a recursos</p>
          <p class="mt-1 text-sm leading-5 text-slate-500">Encuentra materiales organizados para reforzar tus clases y tareas.</p>
        </div>
      </div>
    </article>

    <article>
      <div class="flex items-start gap-3">
        <span class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-gradient-to-br from-amber-100 to-orange-200 shadow-md shadow-orange-900/10">
          <img src="/img/people_icon.png" alt="" class="h-7 w-7 object-contain" />
        </span>
        <div>
          <p class="text-sm font-bold text-slate-900">Aprende en comunidad</p>
          <p class="mt-1 text-sm leading-5 text-slate-500">Conecta con estudiantes y docentes que comparten el mismo propósito.</p>
        </div>
      </div>
    </article>
  </div>
</div>
