<!-- Banner de bienvenida -->
<section class="relative overflow-hidden rounded-[2rem] bg-gradient-to-br from-main-900 via-main-800 to-main-600 p-8 shadow-2xl sm:p-12 transition-all duration-500 hover:shadow-main-500/20">
  <!-- Decoraciones de fondo (Glassmorphism & Blurs) -->
  <div class="pointer-events-none absolute inset-0">
    <!-- Círculo brillante superior derecho -->
    <div class="absolute -right-20 -top-20 h-96 w-96 rounded-full bg-main-400/30 blur-[100px] transition-transform duration-1000 ease-in-out hover:scale-110"></div>
    <!-- Círculo brillante inferior izquierdo -->
    <div class="absolute -bottom-32 -left-32 h-[30rem] w-[30rem] rounded-full bg-teal-500/20 blur-[120px]"></div>
    <!-- Destello central -->
    <div class="absolute left-1/2 top-1/2 h-64 w-64 -translate-x-1/2 -translate-y-1/2 rounded-full bg-emerald-500/15 blur-[80px]"></div>
    
    <!-- Patrón de puntos sutil (opcional) -->
    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] opacity-50"></div>
  </div>

  <div class="relative z-10 flex flex-col gap-8 lg:flex-row lg:items-center lg:justify-between">
    <div class="flex max-w-2xl flex-col items-start">
      <!-- Título principal -->
      <h1 class="text-3xl font-extrabold tracking-tight text-white sm:text-4xl lg:text-5xl drop-shadow-md truncate">
        Bienvenido, (Estudiante)
      </h1>
      
      <!-- Descripción -->
      <p class="mt-5 text-lg leading-relaxed text-main-50 sm:text-xl font-light max-w-xl">
        Explora, aprende y comparte. Tu espacio personal para acceder a todos los recursos educativos y gestionar tu aprendizaje de forma inteligente.
      </p>
    </div>

    <!-- Avatar decorativo Premium (Placeholder para foto de usuario) -->
    <div class="hidden sm:flex shrink-0 items-center justify-center relative mt-8 lg:mt-0 group perspective-1000">
      <!-- Sombra brillante detrás del avatar -->
      <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-main-400/40 to-emerald-400/40 blur-2xl transition-all duration-500 group-hover:blur-3xl group-hover:opacity-80"></div>
      
      <!-- Contenedor del avatar con glassmorphism -->
      <div class="relative flex h-40 w-40 items-center justify-center rounded-full bg-white/10 shadow-[0_8px_32px_0_rgba(31,38,135,0.37)] backdrop-blur-[12px] ring-2 ring-white/40 transition-all duration-500 group-hover:-translate-y-2 group-hover:rotate-3 group-hover:scale-105 group-hover:bg-white/20 overflow-hidden">
        <!-- Borde interior sutil -->
        <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-white/10 to-transparent"></div>
        
        <!-- Icono de usuario por defecto (Reemplazar con etiqueta <img> cuando haya foto) -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="relative z-10 h-20 w-20 text-white/80">
          <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </div>
    </div>
  </div>
</section>
