<section class="pt-6">
  <div class="relative">
    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" />
      </svg>
    </span>
    <input
      type="text"
      placeholder="Buscar recursos educativos..."
      class="rounded-2xl border border-slate-200 bg-white pl-12 pr-5 py-3.5 w-full outline-none focus:border-main-400 focus:ring-2 focus:ring-main-100 transition"
    />
  </div>

  <div class="flex flex-wrap gap-2 mt-4">
    @for (cat of categories(); track cat.label) {
      <button
        type="button"
        (click)="selectCategory(cat.label)"
        [class]="cat.active
          ? 'rounded-full px-4 py-2 text-sm font-semibold cursor-pointer transition bg-main-600 text-white shadow-md shadow-main-600/25'
          : 'rounded-full px-4 py-2 text-sm font-semibold cursor-pointer transition bg-white text-slate-600 border border-slate-200 hover:border-main-300 hover:text-main-700'"
      >
        {{ cat.label }}
      </button>
    }
  </div>
</section>
