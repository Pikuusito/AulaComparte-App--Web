<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
  <!-- Materiales guardados -->
  <div class="rounded-2xl border border-slate-100 bg-white p-6">
    <h3 class="text-lg font-black text-slate-950">🔖 Materiales guardados</h3>

    <div class="mt-4">
      @for (item of savedItems(); track item.title) {
        <div class="flex items-center gap-3 py-3 border-b border-slate-100 last:border-0">
          <span class="h-2 w-2 rounded-full shrink-0" [ngClass]="item.color"></span>
          <span class="text-sm font-semibold text-slate-700">{{ item.title }}</span>
          <span class="text-xs text-slate-400 ml-auto whitespace-nowrap">{{ item.subject }}</span>
        </div>
      }
    </div>
  </div>

  <!-- Solicitudes activas -->
  <div class="rounded-2xl border border-slate-100 bg-white p-6">
    <h3 class="text-lg font-black text-slate-950">📋 Solicitudes activas</h3>

    <div class="mt-4">
      @for (item of requestItems(); track item.title) {
        <div class="flex items-start gap-3 py-3 border-b border-slate-100 last:border-0">
          <span class="h-2 w-2 rounded-full mt-1.5 shrink-0" [ngClass]="item.dotColor"></span>
          <div>
            <p class="text-sm font-semibold text-slate-700">{{ item.title }}</p>
            <p class="text-xs" [ngClass]="item.textColor">{{ item.status }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</div>
