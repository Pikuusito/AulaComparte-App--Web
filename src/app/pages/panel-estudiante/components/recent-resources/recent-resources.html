<section>
  <h2 class="text-2xl font-black text-slate-950">Recursos recientes</h2>
  <p class="text-sm text-slate-500 mt-1">Materiales compartidos por la comunidad</p>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 mt-6">
    @for (resource of resources(); track resource.id) {
      <div class="rounded-2xl border border-slate-100 bg-white p-5 shadow-sm hover:shadow-lg hover:-translate-y-1 transition group">
        <!-- Type badge -->
        <span class="rounded-full px-3 py-1 text-xs font-bold" [ngClass]="getTypeBadgeClasses(resource.type)">
          {{ resource.type }}
        </span>

        <!-- Title -->
        <h3 class="text-base font-bold text-slate-900 mt-3">{{ resource.title }}</h3>

        <!-- Description -->
        <p class="text-sm text-slate-500 mt-1 line-clamp-2">{{ resource.description }}</p>

        <!-- Bottom: author + downloads -->
        <div class="mt-4 flex items-center justify-between">
          <span class="text-xs text-slate-400">{{ resource.author }}</span>
          <span class="text-xs text-slate-400 flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5m0 0l5-5m-5 5V3" />
            </svg>
            {{ resource.downloads }}
          </span>
        </div>
      </div>
    }
  </div>
</section>
